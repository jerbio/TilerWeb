<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#191919"/>
    </linearGradient>
    <linearGradient id="confirmBtn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(74,222,128,0.18)"/>
      <stop offset="100%" stop-color="rgba(74,222,128,0.10)"/>
    </linearGradient>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#4ade80" flood-opacity="0.22" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
  </defs>

  <rect width="640" height="320" fill="url(#bg3)"/>

  <!-- Header -->
  <rect width="640" height="48" fill="#141414"/>
  <rect y="48" width="640" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="320" y="30" font-family="Urbanist,Inter,sans-serif" font-size="14" font-weight="600" fill="#e5e5e5" text-anchor="middle">Here's your schedule</text>
  <text x="618" y="30" font-family="Urbanist,Inter,sans-serif" font-size="12" font-weight="800" fill="#ED123B" text-anchor="end">tiler</text>

  <!-- Proposed tile card -->
  <rect x="40" y="68" width="560" height="88" rx="16" fill="url(#cardBg)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="40" y="68" width="5" height="88" rx="2.5" fill="#05A39C" fill-opacity="0.8"/>

  <text x="62" y="95" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#ffffff">Gym session</text>
  <text x="62" y="115" font-family="Inter,sans-serif" font-size="11" fill="#525252">📅  Tomorrow (Fri) · 7:30 – 8:30 AM</text>
  <text x="62" y="133" font-family="Inter,sans-serif" font-size="11" fill="#525252">📍  The gym</text>
  <text x="62" y="151" font-family="Inter,sans-serif" font-size="11" fill="#525252">🚗  Leave by 7:12 AM · 18 min drive</text>

  <!-- Adjust note -->
  <text x="320" y="182" font-family="Inter,sans-serif" font-size="10" fill="#3d3d3d" text-anchor="middle">Not right? Adjust the time or swap the day.</text>

  <!-- Adjust chips -->
  <rect x="150" y="192" width="90" height="28" rx="14" fill="#1e1e1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="195" y="210" font-family="Inter,sans-serif" font-size="11" fill="#737373" text-anchor="middle">Change time</text>

  <rect x="254" y="192" width="84" height="28" rx="14" fill="#1e1e1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="296" y="210" font-family="Inter,sans-serif" font-size="11" fill="#737373" text-anchor="middle">Different day</text>

  <rect x="352" y="192" width="138" height="28" rx="14" fill="#1e1e1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="421" y="210" font-family="Inter,sans-serif" font-size="11" fill="#737373" text-anchor="middle">Show alternatives</text>

  <!-- Confirm button -->
  <rect x="40" y="238" width="560" height="48" rx="14" fill="url(#confirmBtn)" stroke="rgba(74,222,128,0.45)" stroke-width="1.5" filter="url(#greenGlow)"/>
  <text x="320" y="268" font-family="Urbanist,Inter,sans-serif" font-size="15" font-weight="700" fill="#4ade80" text-anchor="middle">✓  Confirm — Add to Schedule</text>
</svg>
