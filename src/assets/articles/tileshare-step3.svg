<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#191919"/>
    </linearGradient>
  </defs>

  <rect width="640" height="320" fill="url(#bg3)"/>

  <!-- Header -->
  <rect width="640" height="48" fill="#141414"/>
  <rect y="48" width="640" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="320" y="30" font-family="Urbanist,Inter,sans-serif" font-size="14" font-weight="600" fill="#e5e5e5" text-anchor="middle">Design review</text>
  <text x="618" y="30" font-family="Urbanist,Inter,sans-serif" font-size="12" font-weight="800" fill="#ED123B" text-anchor="end">tiler</text>

  <!-- Tile detail card -->
  <rect x="40" y="64" width="560" height="84" rx="14" fill="url(#cardBg)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <rect x="40" y="64" width="5" height="84" rx="2.5" fill="#8b5cf6"/>
  <text x="62" y="91" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#ffffff">Design review</text>
  <text x="62" y="111" font-family="Inter,sans-serif" font-size="10" fill="#525252">📅  Thursday · 10:30 AM – 11:30 AM</text>
  <text x="62" y="128" font-family="Inter,sans-serif" font-size="10" fill="#525252">📍  Studio  ·  Shared by Alex</text>

  <!-- Status row -->
  <text x="40" y="172" font-family="Inter,sans-serif" font-size="10" fill="#3d3d3d" letter-spacing="0.5">STATUS</text>

  <!-- Alex row -->
  <rect x="40" y="182" width="560" height="40" rx="10" fill="#1a1a1a" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <circle cx="62" cy="202" r="10" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="62" y="206" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#a78bfa" text-anchor="middle">A</text>
  <text x="82" y="206" font-family="Inter,sans-serif" font-size="12" fill="#d4d4d4">Alex (you)</text>
  <text x="82" y="216" font-family="Inter,sans-serif" font-size="9" fill="#525252">Owner · created this tile</text>
  <rect x="488" y="191" width="100" height="22" rx="11" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <text x="538" y="205" font-family="Inter,sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">✓ Scheduled</text>

  <!-- Jamie row -->
  <rect x="40" y="228" width="560" height="40" rx="10" fill="#1a1a1a" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <circle cx="62" cy="248" r="10" fill="#0077FF" fill-opacity="0.2" stroke="#0077FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="62" y="252" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#60a5fa" text-anchor="middle">J</text>
  <text x="82" y="252" font-family="Inter,sans-serif" font-size="12" fill="#d4d4d4">Jamie</text>
  <text x="82" y="262" font-family="Inter,sans-serif" font-size="9" fill="#525252">Received · auto-scheduled at 10:30 AM</text>
  <rect x="488" y="237" width="100" height="22" rx="11" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <text x="538" y="251" font-family="Inter,sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">✓ Scheduled</text>

  <!-- Note -->
  <text x="320" y="292" font-family="Inter,sans-serif" font-size="10" fill="#3a3a3a" text-anchor="middle">No "did you get to that?" needed. Both sides stay in sync.</text>
</svg>
