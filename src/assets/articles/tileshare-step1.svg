<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="sharedTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(139,92,246,0.12)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0.06)"/>
    </linearGradient>
    <filter id="purpleGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
  </defs>

  <rect width="640" height="320" fill="url(#bg1)"/>

  <!-- Header -->
  <rect width="640" height="48" fill="#141414"/>
  <rect y="48" width="640" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="320" y="30" font-family="Urbanist,Inter,sans-serif" font-size="14" font-weight="600" fill="#737373" text-anchor="middle">Thursday, Jun 19</text>
  <text x="618" y="30" font-family="Urbanist,Inter,sans-serif" font-size="12" font-weight="800" fill="#ED123B" text-anchor="end">tiler</text>

  <!-- Tile being shared -->
  <rect x="40" y="66" width="560" height="72" rx="14" fill="url(#sharedTile)" stroke="#8b5cf6" stroke-width="2" filter="url(#purpleGlow)"/>
  <rect x="40" y="66" width="5" height="72" rx="2.5" fill="#8b5cf6"/>
  <text x="62" y="95" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#ffffff">Design review</text>
  <text x="62" y="116" font-family="Inter,sans-serif" font-size="11" fill="rgba(167,139,250,0.6)">@ Studio  ·  10:30 AM  ·  60 min</text>
  <!-- Share button on tile -->
  <rect x="476" y="77" width="108" height="30" rx="15" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
  <text x="530" y="96" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#a78bfa" text-anchor="middle">↗  Share tile</text>

  <!-- Share sheet -->
  <rect x="40" y="154" width="560" height="134" rx="16" fill="#1e1e1e" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="320" y="180" font-family="Urbanist,Inter,sans-serif" font-size="13" font-weight="700" fill="#e5e5e5" text-anchor="middle">Share with a Tiler contact</text>

  <!-- Contact row 1 -->
  <circle cx="80" cy="214" r="16" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-opacity="0.35" stroke-width="1"/>
  <text x="80" y="219" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle">J</text>
  <text x="108" y="213" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#e5e5e5">Jamie</text>
  <text x="108" y="228" font-family="Inter,sans-serif" font-size="10" fill="#525252">Last active 2 min ago</text>
  <rect x="514" y="204" width="66" height="26" rx="13" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="547" y="221" font-family="Inter,sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">Send</text>

  <!-- Contact row 2 -->
  <circle cx="80" cy="258" r="16" fill="#0077FF" fill-opacity="0.2" stroke="#0077FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="263" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#60a5fa" text-anchor="middle">M</text>
  <text x="108" y="257" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#737373">Morgan</text>
  <text x="108" y="272" font-family="Inter,sans-serif" font-size="10" fill="#3d3d3d">Tiler contact</text>
  <rect x="514" y="248" width="66" height="26" rx="13" fill="#1a1a1a" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="547" y="265" font-family="Inter,sans-serif" font-size="10" fill="#525252" text-anchor="middle">Send</text>
</svg>
