<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="tillerBubble" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <rect width="640" height="320" fill="url(#bg2)"/>

  <!-- Header -->
  <rect width="640" height="48" fill="#141414"/>
  <rect y="48" width="640" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="320" y="30" font-family="Urbanist,Inter,sans-serif" font-size="14" font-weight="600" fill="#737373" text-anchor="middle">New Task</text>
  <text x="618" y="30" font-family="Urbanist,Inter,sans-serif" font-size="12" font-weight="800" fill="#ED123B" text-anchor="end">tiler</text>

  <!-- User message (right-aligned) -->
  <rect x="278" y="64" width="322" height="40" rx="12" fill="#1e1e1e" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="290" y="89" font-family="Inter,sans-serif" font-size="12" fill="#a3a3a3">Gym session tomorrow morning for an hour</text>

  <!-- Tiler avatar dot -->
  <circle cx="44" cy="152" r="14" fill="#1a1a1a" stroke="rgba(237,18,59,0.3)" stroke-width="1.5"/>
  <text x="44" y="157" font-family="Urbanist,Inter,sans-serif" font-size="10" font-weight="800" fill="#ED123B" text-anchor="middle">t</text>

  <!-- Tiler question bubble -->
  <rect x="68" y="130" width="390" height="52" rx="14" fill="url(#tillerBubble)" stroke="rgba(237,18,59,0.2)" stroke-width="1"/>
  <text x="88" y="153" font-family="Inter,sans-serif" font-size="13" fill="#e5e5e5">Which gym do you usually go to?</text>
  <text x="88" y="172" font-family="Inter,sans-serif" font-size="11" fill="#525252">Type a name or pick a label you've used before.</text>

  <!-- Quick reply chips -->
  <rect x="68" y="196" width="82" height="30" rx="15" fill="#1e1e1e" stroke="rgba(237,18,59,0.25)" stroke-width="1"/>
  <text x="109" y="215" font-family="Inter,sans-serif" font-size="11" fill="#d4d4d4" text-anchor="middle">The gym</text>

  <rect x="162" y="196" width="72" height="30" rx="15" fill="#1e1e1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="198" y="215" font-family="Inter,sans-serif" font-size="11" fill="#737373" text-anchor="middle">@ Home</text>

  <rect x="246" y="196" width="112" height="30" rx="15" fill="#1e1e1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="302" y="215" font-family="Inter,sans-serif" font-size="11" fill="#737373" text-anchor="middle">Add new place</text>

  <!-- Note -->
  <text x="320" y="278" font-family="Inter,sans-serif" font-size="10" fill="#3a3a3a" text-anchor="middle">One question at a time — never a form.</text>
</svg>
