<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="inputBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1d1d"/>
      <stop offset="100%" stop-color="#191919"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#ED123B" flood-opacity="0.12" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
  </defs>

  <rect width="640" height="320" fill="url(#bg1)"/>

  <!-- Header -->
  <rect width="640" height="48" fill="#141414"/>
  <rect y="48" width="640" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="320" y="30" font-family="Urbanist,Inter,sans-serif" font-size="14" font-weight="600" fill="#737373" text-anchor="middle">New Task</text>
  <text x="618" y="30" font-family="Urbanist,Inter,sans-serif" font-size="12" font-weight="800" fill="#ED123B" text-anchor="end">tiler</text>

  <!-- Prompt -->
  <text x="320" y="88" font-family="Inter,sans-serif" font-size="11" fill="#525252" text-anchor="middle" letter-spacing="0.5">WHAT DO YOU NEED TO DO?</text>

  <!-- Input box -->
  <rect x="40" y="100" width="560" height="80" rx="16" fill="url(#inputBg)" stroke="rgba(237,18,59,0.4)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="64" y="146" font-family="Inter,sans-serif" font-size="17" fill="#e5e5e5">Gym session tomorrow morning for an hour</text>
  <rect x="554" y="130" width="2" height="20" rx="1" fill="#ED123B" opacity="0.85"/>

  <!-- Helper chips below input -->
  <rect x="40" y="198" width="120" height="26" rx="13" fill="#1e1e1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="100" y="215" font-family="Inter,sans-serif" font-size="10" fill="#737373" text-anchor="middle">tomorrow</text>

  <rect x="172" y="198" width="80" height="26" rx="13" fill="#1e1e1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="212" y="215" font-family="Inter,sans-serif" font-size="10" fill="#737373" text-anchor="middle">morning</text>

  <rect x="264" y="198" width="82" height="26" rx="13" fill="#1e1e1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="305" y="215" font-family="Inter,sans-serif" font-size="10" fill="#737373" text-anchor="middle">an hour</text>

  <!-- Note -->
  <text x="320" y="272" font-family="Inter,sans-serif" font-size="10" fill="#3a3a3a" text-anchor="middle">No special syntax. Just describe what you need.</text>
</svg>
