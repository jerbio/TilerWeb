<svg xmlns="http://www.w3.org/2000/svg" width="860" height="300" viewBox="0 0 860 300">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="travelGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(96,165,250,0.10)"/>
      <stop offset="100%" stop-color="rgba(96,165,250,0.04)"/>
    </linearGradient>
    <filter id="blueGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#60a5fa" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
  </defs>

  <rect width="860" height="300" fill="url(#bg1)"/>

  <!-- ── LEFT EVENT: Team standup @ Work ── -->
  <rect x="32" y="80" width="238" height="140" rx="14" fill="#0077FF" fill-opacity="0.09" stroke="#0077FF" stroke-opacity="0.25" stroke-width="1.5"/>
  <rect x="32" y="80" width="5" height="140" rx="2.5" fill="#0077FF" fill-opacity="0.7"/>
  <text x="52" y="148" font-family="Urbanist,Inter,sans-serif" font-size="18" font-weight="700" fill="rgba(210,228,255,0.9)" text-anchor="middle" x="151">Team standup</text>
  <text x="151" y="148" font-family="Urbanist,Inter,sans-serif" font-size="17" font-weight="700" fill="rgba(210,228,255,0.9)" text-anchor="middle">Team standup</text>
  <text x="151" y="172" font-family="Inter,sans-serif" font-size="11" fill="rgba(96,165,250,0.5)" text-anchor="middle">@ Work</text>
  <text x="151" y="194" font-family="Inter,sans-serif" font-size="10" fill="rgba(96,165,250,0.35)" text-anchor="middle">ends 9:45 AM</text>

  <!-- Connector dot right -->
  <circle cx="270" cy="150" r="4" fill="rgba(96,165,250,0.4)" stroke="rgba(96,165,250,0.15)" stroke-width="8"/>

  <!-- ── CENTER: Travel block ── -->
  <rect x="290" y="108" width="280" height="84" rx="14" fill="url(#travelGlow)" stroke="rgba(96,165,250,0.35)" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#blueGlow)"/>
  <text x="430" y="148" font-family="Inter,sans-serif" font-size="22" fill="rgba(96,165,250,0.85)" text-anchor="middle">🚗</text>
  <text x="430" y="172" font-family="Urbanist,Inter,sans-serif" font-size="15" font-weight="700" fill="rgba(96,165,250,0.8)" text-anchor="middle">Drive · 22 min</text>

  <!-- Connector dot left of right event -->
  <circle cx="590" cy="150" r="4" fill="rgba(96,165,250,0.4)" stroke="rgba(96,165,250,0.15)" stroke-width="8"/>

  <!-- ── RIGHT EVENT: Coffee with Priya @ Downtown Café ── -->
  <rect x="610" y="80" width="218" height="140" rx="14" fill="#05A39C" fill-opacity="0.09" stroke="#05A39C" stroke-opacity="0.25" stroke-width="1.5"/>
  <rect x="610" y="80" width="5" height="140" rx="2.5" fill="#05A39C" fill-opacity="0.7"/>
  <text x="719" y="148" font-family="Urbanist,Inter,sans-serif" font-size="15" font-weight="700" fill="rgba(200,242,240,0.9)" text-anchor="middle">Coffee with Priya</text>
  <text x="719" y="172" font-family="Inter,sans-serif" font-size="11" fill="rgba(5,163,156,0.5)" text-anchor="middle">@ Downtown Café</text>
  <text x="719" y="194" font-family="Inter,sans-serif" font-size="10" fill="rgba(5,163,156,0.35)" text-anchor="middle">starts 10:10 AM</text>
</svg>
