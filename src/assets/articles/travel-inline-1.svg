<svg xmlns="http://www.w3.org/2000/svg" width="860" height="320" viewBox="0 0 860 320">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="travelBlock" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(96,165,250,0.09)"/>
      <stop offset="100%" stop-color="rgba(96,165,250,0.04)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="320" fill="url(#bg1)"/>

  <!-- Header -->
  <rect width="860" height="48" fill="#141414"/>
  <rect y="48" width="860" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="20" y="30" font-family="Inter, sans-serif" font-size="18" fill="#404040">←</text>
  <text x="430" y="30" font-family="Urbanist, Inter, sans-serif" font-size="15" font-weight="600" fill="#e5e5e5" text-anchor="middle">Wednesday, May 8</text>
  <text x="840" y="30" font-family="Urbanist, Inter, sans-serif" font-size="13" font-weight="800" fill="#ED123B" text-anchor="end">tiler</text>

  <!-- Time column -->
  <rect x="0" y="48" width="52" height="272" fill="#111111"/>
  <rect x="52" y="48" width="1" height="272" fill="rgba(255,255,255,0.05)"/>

  <text x="26" y="98"  font-family="Inter, sans-serif" font-size="9" fill="#3d3d3d" text-anchor="middle">9 AM</text>
  <text x="26" y="148" font-family="Inter, sans-serif" font-size="9" fill="#3d3d3d" text-anchor="middle">10 AM</text>
  <text x="26" y="198" font-family="Inter, sans-serif" font-size="9" fill="#3d3d3d" text-anchor="middle">11 AM</text>
  <text x="26" y="248" font-family="Inter, sans-serif" font-size="9" fill="#3d3d3d" text-anchor="middle">12 PM</text>
  <text x="26" y="298" font-family="Inter, sans-serif" font-size="9" fill="#3d3d3d" text-anchor="middle">1 PM</text>

  <!-- Hour grid lines -->
  <line x1="53" y1="96"  x2="860" y2="96"  stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="53" y1="146" x2="860" y2="146" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="53" y1="196" x2="860" y2="196" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="53" y1="246" x2="860" y2="246" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="53" y1="296" x2="860" y2="296" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- ── EVENT 1: Team standup @ Work — 9:00–9:45 AM ── -->
  <rect x="61" y="98" width="780" height="44" rx="9" fill="#0077FF" fill-opacity="0.10" stroke="#0077FF" stroke-opacity="0.28" stroke-width="1"/>
  <rect x="61" y="98" width="4" height="44" rx="2" fill="#0077FF" fill-opacity="0.7"/>
  <text x="76" y="116" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="rgba(200,220,255,0.9)">Team standup</text>
  <text x="76" y="132" font-family="Inter, sans-serif" font-size="10" fill="rgba(106,171,255,0.5)">@ Work · 9:00 – 9:45 AM</text>

  <!-- ── TRAVEL BLOCK 1: Drive 22 min ── -->
  <rect x="61" y="148" width="780" height="26" rx="7" fill="url(#travelBlock)" stroke="rgba(96,165,250,0.22)" stroke-width="1" stroke-dasharray="5,3"/>
  <rect x="61" y="148" width="3" height="26" rx="1.5" fill="rgba(96,165,250,0.4)" stroke="none" stroke-dasharray="none"/>
  <text x="78" y="165" font-family="Inter, sans-serif" font-size="10" fill="rgba(96,165,250,0.75)">🚗  Drive · 22 min</text>
  <text x="780" y="165" font-family="Inter, sans-serif" font-size="9" fill="rgba(96,165,250,0.4)" text-anchor="end">Arrive 10:07 AM</text>

  <!-- ── EVENT 2: Coffee with Priya @ Downtown Café — 10:10 AM ── -->
  <rect x="61" y="180" width="780" height="44" rx="9" fill="#05A39C" fill-opacity="0.10" stroke="#05A39C" stroke-opacity="0.28" stroke-width="1"/>
  <rect x="61" y="180" width="4" height="44" rx="2" fill="#05A39C" fill-opacity="0.7"/>
  <text x="76" y="198" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="rgba(180,240,235,0.9)">Coffee with Priya</text>
  <text x="76" y="214" font-family="Inter, sans-serif" font-size="10" fill="rgba(5,163,156,0.55)">@ Downtown Café · 10:10 AM – 11:00 AM</text>

  <!-- ── TRAVEL BLOCK 2: Walk 8 min ── -->
  <rect x="61" y="230" width="780" height="26" rx="7" fill="url(#travelBlock)" stroke="rgba(96,165,250,0.22)" stroke-width="1" stroke-dasharray="5,3"/>
  <rect x="61" y="230" width="3" height="26" rx="1.5" fill="rgba(96,165,250,0.4)" stroke="none" stroke-dasharray="none"/>
  <text x="78" y="247" font-family="Inter, sans-serif" font-size="10" fill="rgba(96,165,250,0.75)">🚶  Walk · 8 min</text>
  <text x="780" y="247" font-family="Inter, sans-serif" font-size="9" fill="rgba(96,165,250,0.4)" text-anchor="end">Arrive 11:08 AM</text>

  <!-- ── EVENT 3: Client pitch @ Studio — 11:10 AM ── -->
  <rect x="61" y="262" width="780" height="44" rx="9" fill="#ED123B" fill-opacity="0.08" stroke="#ED123B" stroke-opacity="0.22" stroke-width="1"/>
  <rect x="61" y="262" width="4" height="44" rx="2" fill="#ED123B" fill-opacity="0.6"/>
  <text x="76" y="280" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="rgba(255,200,210,0.9)">Client pitch</text>
  <text x="76" y="296" font-family="Inter, sans-serif" font-size="10" fill="rgba(237,18,59,0.5)">@ Studio · 11:10 AM – 12:00 PM</text>
</svg>
