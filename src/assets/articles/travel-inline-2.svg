  <text x="60" y="222" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Team standup</text>
  <text x="60" y="242" font-family="Inter, sans-serif" font-size="12" fill="rgba(96,165,250,0.8)">@ Work</text>
  <line x1="60" y1="254" x2="400" y2="254" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="60" y="272" font-family="Inter, sans-serif" font-size="10" fill="#525252">Daily · 9:00 AM · 30 min</text>
  <text x="60" y="287" font-family="Inter, sans-serif" font-size="9" fill="#3a3a3a">🚌  Commute · 28 min calculated automatically</text>

  <!-- ── TILE 4: Grocery run @ Near the office ── -->
  <rect x="445" y="188" width="375" height="108" rx="14" fill="url(#card)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="445" y="188" width="5" height="108" rx="2.5" fill="#8B5CF6"/>
  <rect x="738" y="202" width="67" height="20" rx="10" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="771" y="215" font-family="Inter, sans-serif" font-size="9" fill="rgba(167,139,250,0.7)" text-anchor="middle">📍 near office</text>
  <text x="465" y="222" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Grocery run</text>
  <text x="465" y="242" font-family="Inter, sans-serif" font-size="12" fill="rgba(167,139,250,0.8)">@ Near the office</text>
  <line x1="465" y1="254" x2="805" y2="254" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="465" y="272" font-family="Inter, sans-serif" font-size="10" fill="#525252">Thu · 5:30 PM · 45 min</text>
  <text x="465" y="287" font-family="Inter, sans-serif" font-size="9" fill="#3a3a3a">🚶  Walk · 4 min calculated automatically</text>
