<svg xmlns="http://www.w3.org/2000/svg" width="860" height="280" viewBox="0 0 860 280">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#191919"/>
    </linearGradient>
  </defs>

  <rect width="860" height="280" fill="url(#bg2)"/>

  <!-- ── LEFT TILE: Gym session @ The gym ── -->
  <rect x="60" y="60" width="340" height="160" rx="18" fill="url(#card)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="60" y="60" width="6" height="160" rx="3" fill="#05A39C"/>
  <text x="86" y="138" font-family="Urbanist,Inter,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Gym session</text>
  <text x="86" y="168" font-family="Inter,sans-serif" font-size="14" fill="rgba(5,163,156,0.75)">📍 @ The gym</text>

  <!-- ── RIGHT TILE: Team standup @ Work ── -->
  <rect x="460" y="60" width="340" height="160" rx="18" fill="url(#card)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="460" y="60" width="6" height="160" rx="3" fill="#0077FF"/>
  <text x="486" y="138" font-family="Urbanist,Inter,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Team standup</text>
  <text x="486" y="168" font-family="Inter,sans-serif" font-size="14" fill="rgba(96,165,250,0.75)">📍 @ Work</text>
</svg>
