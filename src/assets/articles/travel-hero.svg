<svg xmlns="http://www.w3.org/2000/svg" width="860" height="480" viewBox="0 0 860 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="routeLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#080808" stop-opacity="0"/>
      <stop offset="85%" stop-color="#080808" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0.9"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="860" height="480" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="860" height="480" fill="url(#bg)"/>

    <!-- Header -->
    <rect width="860" height="50" fill="url(#hdr)"/>
    <rect y="50" width="860" height="1" fill="rgba(255,255,255,0.06)"/>
    <text x="26" y="31" font-family="Inter,sans-serif" font-size="20" fill="#3d3d3d">←</text>
    <text x="340" y="32" font-family="Urbanist,Inter,sans-serif" font-size="15" font-weight="700" fill="#d4d4d4" text-anchor="middle">Thursday, Jun 19</text>
    <text x="800" y="32" font-family="Urbanist,Inter,sans-serif" font-size="13" font-weight="800" fill="#ED123B">tiler</text>

    <!-- Time column -->
    <rect x="0" y="50" width="50" height="430" fill="#0f0f0f"/>
    <rect x="50" y="50" width="1" height="430" fill="rgba(255,255,255,0.05)"/>
    <text x="25" y="92"  font-family="Inter,sans-serif" font-size="9" fill="#333" text-anchor="middle">8 AM</text>
    <text x="25" y="142" font-family="Inter,sans-serif" font-size="9" fill="#333" text-anchor="middle">9 AM</text>
    <text x="25" y="192" font-family="Inter,sans-serif" font-size="9" fill="#333" text-anchor="middle">10 AM</text>
    <text x="25" y="242" font-family="Inter,sans-serif" font-size="9" fill="#333" text-anchor="middle">11 AM</text>
    <text x="25" y="292" font-family="Inter,sans-serif" font-size="9" fill="#333" text-anchor="middle">12 PM</text>
    <text x="25" y="342" font-family="Inter,sans-serif" font-size="9" fill="#333" text-anchor="middle">1 PM</text>
    <text x="25" y="392" font-family="Inter,sans-serif" font-size="9" fill="#333" text-anchor="middle">2 PM</text>
    <text x="25" y="442" font-family="Inter,sans-serif" font-size="9" fill="#333" text-anchor="middle">3 PM</text>

    <!-- Grid lines -->
    <line x1="51" y1="90"  x2="600" y2="90"  stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    <line x1="51" y1="140" x2="600" y2="140" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    <line x1="51" y1="190" x2="600" y2="190" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    <line x1="51" y1="240" x2="600" y2="240" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    <line x1="51" y1="290" x2="600" y2="290" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    <line x1="51" y1="340" x2="600" y2="340" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    <line x1="51" y1="390" x2="600" y2="390" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    <line x1="51" y1="440" x2="600" y2="440" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>

    <!-- TILE 1: Morning run @ Home (8:00–8:30) -->
    <rect x="59" y="90" width="390" height="30" rx="7" fill="#05A39C" fill-opacity="0.14" stroke="#05A39C" stroke-opacity="0.35" stroke-width="1"/>
    <rect x="59" y="90" width="3.5" height="30" rx="1.5" fill="#05A39C" fill-opacity="0.8"/>
    <text x="72" y="103" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="rgba(5,163,156,0.85)">Morning run</text>
    <text x="72" y="114" font-family="Inter,sans-serif" font-size="8.5" fill="rgba(5,163,156,0.45)">📍 Home · 8:00–8:30 AM</text>

    <!-- TRAVEL BLOCK 1: Home → Work (25 min drive) -->
    <rect x="59" y="124" width="390" height="18" rx="5" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.25)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="72" y="136" font-family="Inter,sans-serif" font-size="8.5" fill="rgba(96,165,250,0.65)">🚗  Drive · 25 min  →  Work</text>

    <!-- TILE 2: Team standup @ Work (9:00–9:45) -->
    <rect x="59" y="145" width="390" height="44" rx="8" fill="#0077FF" fill-opacity="0.14" stroke="#0077FF" stroke-opacity="0.35" stroke-width="1"/>
    <rect x="59" y="145" width="3.5" height="44" rx="1.5" fill="#0077FF" fill-opacity="0.8"/>
    <text x="72" y="162" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="rgba(96,165,250,0.9)">Team standup</text>
    <text x="72" y="178" font-family="Inter,sans-serif" font-size="9" fill="rgba(96,165,250,0.45)">📍 Work · 9:00–9:45 AM</text>

    <!-- TRAVEL BLOCK 2: Work → Downtown (18 min drive) -->
    <rect x="59" y="193" width="390" height="18" rx="5" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.25)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="72" y="205" font-family="Inter,sans-serif" font-size="8.5" fill="rgba(96,165,250,0.65)">🚗  Drive · 18 min  →  Downtown</text>

    <!-- TILE 3: Coffee @ Downtown (10:30–11:15) -->
    <rect x="59" y="215" width="390" height="44" rx="8" fill="#7c3aed" fill-opacity="0.14" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="1"/>
    <rect x="59" y="215" width="3.5" height="44" rx="1.5" fill="#a78bfa" fill-opacity="0.8"/>
    <text x="72" y="232" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="rgba(167,139,250,0.9)">Coffee with Priya</text>
    <text x="72" y="248" font-family="Inter,sans-serif" font-size="9" fill="rgba(167,139,250,0.45)">📍 Downtown · 10:30–11:15 AM</text>

    <!-- TRAVEL BLOCK 3: Downtown → Near the office (8 min walk) -->
    <rect x="59" y="263" width="390" height="18" rx="5" fill="rgba(96,165,250,0.06)" stroke="rgba(96,165,250,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="72" y="275" font-family="Inter,sans-serif" font-size="8.5" fill="rgba(96,165,250,0.55)">🚶  Walk · 8 min  →  Near the office</text>

    <!-- TILE 4: Lunch @ Near the office (11:30) -->
    <rect x="59" y="285" width="390" height="30" rx="7" fill="#171717" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <rect x="59" y="285" width="3.5" height="30" rx="1.5" fill="rgba(255,255,255,0.2)"/>
    <text x="72" y="299" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#a3a3a3">Lunch break</text>
    <text x="72" y="310" font-family="Inter,sans-serif" font-size="8.5" fill="#525252">📍 Near the office · 11:30 AM</text>

    <!-- TRAVEL BLOCK 4: → Gym (22 min) -->
    <rect x="59" y="319" width="390" height="18" rx="5" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.25)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="72" y="331" font-family="Inter,sans-serif" font-size="8.5" fill="rgba(96,165,250,0.65)">🚗  Drive · 22 min  →  The gym</text>

    <!-- TILE 5: Gym session (1:00–2:00) -->
    <rect x="59" y="341" width="390" height="50" rx="8" fill="#ED123B" fill-opacity="0.12" stroke="#ED123B" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="59" y="341" width="3.5" height="50" rx="1.5" fill="#ED123B" fill-opacity="0.8"/>
    <text x="72" y="361" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="rgba(237,18,59,0.9)">Gym session</text>
    <text x="72" y="378" font-family="Inter,sans-serif" font-size="9" fill="rgba(237,18,59,0.45)">📍 The gym · 1:00–2:00 PM</text>

    <!-- Right panel -->
    <rect x="600" y="50" width="1" height="430" fill="rgba(255,255,255,0.05)"/>
    <rect x="601" y="50" width="259" height="430" fill="url(#panelBg)"/>

    <text x="730" y="82" font-family="Urbanist,Inter,sans-serif" font-size="13" font-weight="700" fill="#d4d4d4" text-anchor="middle">Today's Route</text>
    <line x1="617" y1="92" x2="843" y2="92" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Route stops -->
    <!-- Stop 1 -->
    <circle cx="630" cy="118" r="5" fill="#05A39C" fill-opacity="0.3" stroke="#05A39C" stroke-width="1.5"/>
    <circle cx="630" cy="118" r="2" fill="#05A39C"/>
    <text x="645" y="116" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#d4d4d4">Home</text>
    <text x="645" y="128" font-family="Inter,sans-serif" font-size="8.5" fill="#525252">8:00 AM · depart 7:55</text>

    <!-- connector -->
    <line x1="630" y1="123" x2="630" y2="148" stroke="url(#routeLine)" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="645" y="141" font-family="Inter,sans-serif" font-size="8" fill="rgba(96,165,250,0.5)">🚗 25 min</text>

    <!-- Stop 2 -->
    <circle cx="630" cy="158" r="5" fill="#0077FF" fill-opacity="0.3" stroke="#0077FF" stroke-width="1.5"/>
    <circle cx="630" cy="158" r="2" fill="#60a5fa"/>
    <text x="645" y="156" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#d4d4d4">Work</text>
    <text x="645" y="168" font-family="Inter,sans-serif" font-size="8.5" fill="#525252">9:00 AM · standup</text>

    <line x1="630" y1="163" x2="630" y2="188" stroke="url(#routeLine)" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="645" y="181" font-family="Inter,sans-serif" font-size="8" fill="rgba(96,165,250,0.5)">🚗 18 min</text>

    <!-- Stop 3 -->
    <circle cx="630" cy="198" r="5" fill="#7c3aed" fill-opacity="0.3" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="630" cy="198" r="2" fill="#a78bfa"/>
    <text x="645" y="196" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#d4d4d4">Downtown</text>
    <text x="645" y="208" font-family="Inter,sans-serif" font-size="8.5" fill="#525252">10:30 AM · coffee</text>

    <line x1="630" y1="203" x2="630" y2="228" stroke="url(#routeLine)" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="645" y="221" font-family="Inter,sans-serif" font-size="8" fill="rgba(96,165,250,0.5)">🚶 8 min</text>

    <!-- Stop 4 -->
    <circle cx="630" cy="238" r="5" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <circle cx="630" cy="238" r="2" fill="rgba(255,255,255,0.4)"/>
    <text x="645" y="236" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#d4d4d4">Near the office</text>
    <text x="645" y="248" font-family="Inter,sans-serif" font-size="8.5" fill="#525252">11:30 AM · lunch</text>

    <line x1="630" y1="243" x2="630" y2="268" stroke="url(#routeLine)" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="645" y="261" font-family="Inter,sans-serif" font-size="8" fill="rgba(96,165,250,0.5)">🚗 22 min</text>

    <!-- Stop 5 -->
    <circle cx="630" cy="278" r="5" fill="#ED123B" fill-opacity="0.3" stroke="#ED123B" stroke-width="1.5"/>
    <circle cx="630" cy="278" r="2" fill="#ED123B"/>
    <text x="645" y="276" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#d4d4d4">The gym</text>
    <text x="645" y="288" font-family="Inter,sans-serif" font-size="8.5" fill="#525252">1:00 PM · gym session</text>

    <!-- Stats bar -->
    <rect x="617" y="308" width="226" height="50" rx="10" fill="#1a1a1a" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="730" y="323" font-family="Inter,sans-serif" font-size="8.5" fill="#525252" text-anchor="middle">TOTAL TRAVEL TODAY</text>
    <text x="730" y="346" font-family="Urbanist,Inter,sans-serif" font-size="18" font-weight="700" fill="#60a5fa" text-anchor="middle">1 hr 13 min</text>

    <!-- Leave reminder -->
    <rect x="617" y="368" width="226" height="36" rx="8" fill="rgba(237,18,59,0.06)" stroke="rgba(237,18,59,0.15)" stroke-width="1"/>
    <text x="730" y="381" font-family="Inter,sans-serif" font-size="8.5" fill="rgba(237,18,59,0.7)" text-anchor="middle">⏰ Leave for Work by 8:35 AM</text>
    <text x="730" y="395" font-family="Inter,sans-serif" font-size="8" fill="rgba(237,18,59,0.4)" text-anchor="middle">to arrive on time</text>

    <!-- right fade -->
    <rect x="455" y="50" width="145" height="430" fill="url(#fadeRight)"/>
  </g>
</svg>
