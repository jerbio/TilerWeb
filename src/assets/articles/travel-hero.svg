<svg xmlns="http://www.w3.org/2000/svg" width="860" height="480" viewBox="0 0 860 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0.9"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="860" height="480" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="860" height="480" fill="url(#bg)"/>

    <!-- Header -->
    <rect width="860" height="52" fill="url(#hdr)"/>
    <rect y="52" width="860" height="1" fill="rgba(255,255,255,0.06)"/>
    <text x="28" y="33" font-family="Inter,sans-serif" font-size="18" fill="#3a3a3a">←</text>
    <text x="430" y="33" font-family="Urbanist,Inter,sans-serif" font-size="15" font-weight="700" fill="#d4d4d4" text-anchor="middle">Thursday, Jun 19</text>
    <text x="836" y="33" font-family="Urbanist,Inter,sans-serif" font-size="13" font-weight="800" fill="#ED123B" text-anchor="end">tiler</text>

    <!-- Time column -->
    <rect x="0" y="52" width="56" height="428" fill="#0f0f0f"/>
    <rect x="56" y="52" width="1" height="428" fill="rgba(255,255,255,0.05)"/>
    <text x="28" y="115"  font-family="Inter,sans-serif" font-size="9" fill="#333" text-anchor="middle">9 AM</text>
    <text x="28" y="235" font-family="Inter,sans-serif" font-size="9" fill="#333" text-anchor="middle">10 AM</text>
    <text x="28" y="360" font-family="Inter,sans-serif" font-size="9" fill="#333" text-anchor="middle">11 AM</text>

    <!-- Grid lines -->
    <line x1="57" y1="112"  x2="860" y2="112"  stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    <line x1="57" y1="232" x2="860" y2="232" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    <line x1="57" y1="357" x2="860" y2="357" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>

    <!-- EVENT 1: Team standup @ Work -->
    <rect x="66" y="84" width="778" height="68" rx="14" fill="#0077FF" fill-opacity="0.10" stroke="#0077FF" stroke-opacity="0.28" stroke-width="1.5"/>
    <rect x="66" y="84" width="5" height="68" rx="2.5" fill="#0077FF" fill-opacity="0.7"/>
    <text x="86" y="115" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="rgba(210,228,255,0.92)">Team standup</text>
    <text x="86" y="138" font-family="Inter,sans-serif" font-size="12" fill="rgba(96,165,250,0.5)">@ Work  ·  9:00 – 9:45 AM</text>

    <!-- TRAVEL BLOCK 1 -->
    <rect x="66" y="164" width="778" height="26" rx="7" fill="rgba(96,165,250,0.05)" stroke="rgba(96,165,250,0.2)" stroke-width="1" stroke-dasharray="5,4"/>
    <text x="86" y="181" font-family="Inter,sans-serif" font-size="11" fill="rgba(96,165,250,0.6)">🚗  Drive · 22 min</text>

    <!-- EVENT 2: Coffee with Priya -->
    <rect x="66" y="202" width="778" height="68" rx="14" fill="#05A39C" fill-opacity="0.10" stroke="#05A39C" stroke-opacity="0.26" stroke-width="1.5"/>
    <rect x="66" y="202" width="5" height="68" rx="2.5" fill="#05A39C" fill-opacity="0.7"/>
    <text x="86" y="233" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="rgba(200,242,240,0.92)">Coffee with Priya</text>
    <text x="86" y="256" font-family="Inter,sans-serif" font-size="12" fill="rgba(5,163,156,0.5)">@ Downtown Café  ·  10:10 – 11:00 AM</text>

    <!-- TRAVEL BLOCK 2 -->
    <rect x="66" y="282" width="778" height="26" rx="7" fill="rgba(96,165,250,0.05)" stroke="rgba(96,165,250,0.2)" stroke-width="1" stroke-dasharray="5,4"/>
    <text x="86" y="299" font-family="Inter,sans-serif" font-size="11" fill="rgba(96,165,250,0.6)">🚶  Walk · 8 min</text>

    <!-- EVENT 3: Client pitch -->
    <rect x="66" y="320" width="778" height="68" rx="14" fill="#ED123B" fill-opacity="0.08" stroke="#ED123B" stroke-opacity="0.2" stroke-width="1.5"/>
    <rect x="66" y="320" width="5" height="68" rx="2.5" fill="#ED123B" fill-opacity="0.65"/>
    <text x="86" y="351" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="rgba(255,205,210,0.92)">Client pitch</text>
    <text x="86" y="374" font-family="Inter,sans-serif" font-size="12" fill="rgba(237,18,59,0.45)">@ Studio  ·  11:10 AM – 12:00 PM</text>

    <!-- Bottom fade -->
    <rect x="0" y="350" width="860" height="130" fill="url(#bottomFade)"/>
  </g>
</svg>
