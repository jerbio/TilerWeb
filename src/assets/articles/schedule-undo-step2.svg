<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="previewGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(74,222,128,0.06)"/>
      <stop offset="100%" stop-color="rgba(74,222,128,0.02)"/>
    </linearGradient>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#4ade80" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="320" fill="url(#bg2)"/>

  <!-- Header -->
  <rect width="640" height="48" fill="#141414"/>
  <rect y="48" width="640" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="20" y="30" font-family="Inter, sans-serif" font-size="18" fill="#a3a3a3">←</text>
  <text x="280" y="30" font-family="Urbanist, Inter, sans-serif" font-size="15" font-weight="600" fill="#e5e5e5" text-anchor="middle">Schedule Preview</text>

  <!-- PREVIEW badge top center -->
  <rect x="258" y="60" width="124" height="22" rx="11" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.35)" stroke-width="1"/>
  <text x="320" y="75" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#4ade80" text-anchor="middle" letter-spacing="1">● PREVIEW MODE</text>

  <!-- Left column: ORIGINAL timeline -->
  <text x="60" y="102" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#525252" text-anchor="middle" letter-spacing="0.5">ORIGINAL</text>

  <!-- Original time column -->
  <rect x="0" y="108" width="36" height="200" fill="#111111"/>
  <rect x="36" y="108" width="1" height="200" fill="rgba(255,255,255,0.04)"/>
  <text x="18" y="138" font-family="Inter, sans-serif" font-size="8" fill="#525252" text-anchor="middle">9 AM</text>
  <text x="18" y="178" font-family="Inter, sans-serif" font-size="8" fill="#525252" text-anchor="middle">10 AM</text>
  <text x="18" y="218" font-family="Inter, sans-serif" font-size="8" fill="#525252" text-anchor="middle">11 AM</text>
  <text x="18" y="258" font-family="Inter, sans-serif" font-size="8" fill="#525252" text-anchor="middle">12 PM</text>

  <!-- Hour lines left -->
  <line x1="37" y1="136" x2="290" y2="136" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="37" y1="176" x2="290" y2="176" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="37" y1="216" x2="290" y2="216" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="37" y1="256" x2="290" y2="256" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Standup tile -->
  <rect x="44" y="138" width="240" height="20" rx="5" fill="#0077FF" fill-opacity="0.18" stroke="#0077FF" stroke-opacity="0.4" stroke-width="1"/>
  <text x="54" y="152" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#6aabff">Team standup · 9:00</text>

  <!-- ORIGINAL Gym session tile — solid, full opacity -->
  <rect x="44" y="178" width="240" height="40" rx="7" fill="#ED123B" fill-opacity="0.18" stroke="#ED123B" stroke-width="1.5"/>
  <rect x="44" y="178" width="3" height="40" rx="1.5" fill="#ED123B"/>
  <text x="56" y="195" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Gym session</text>
  <text x="56" y="209" font-family="Inter, sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">@ Home · Tue · 10:00 AM</text>

  <!-- Client call tile -->
  <rect x="44" y="228" width="240" height="20" rx="5" fill="#171717" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="54" y="242" font-family="Inter, sans-serif" font-size="9" fill="#737373">Client call · 11:30 AM</text>

  <!-- Divider between columns -->
  <line x1="295" y1="90" x2="295" y2="300" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="320" y="200" font-family="Inter, sans-serif" font-size="16" fill="rgba(255,255,255,0.15)" text-anchor="middle">→</text>

  <!-- Right column: PREVIEW timeline -->
  <text x="465" y="102" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#4ade80" text-anchor="middle" letter-spacing="0.5">PREVIEW</text>

  <!-- Preview time column (Wed) -->
  <rect x="306" y="108" width="36" height="200" fill="#111111"/>
  <rect x="342" y="108" width="1" height="200" fill="rgba(255,255,255,0.04)"/>
  <text x="324" y="138" font-family="Inter, sans-serif" font-size="8" fill="#525252" text-anchor="middle">1 PM</text>
  <text x="324" y="178" font-family="Inter, sans-serif" font-size="8" fill="#525252" text-anchor="middle">2 PM</text>
  <text x="324" y="218" font-family="Inter, sans-serif" font-size="8" fill="#525252" text-anchor="middle">3 PM</text>
  <text x="324" y="258" font-family="Inter, sans-serif" font-size="8" fill="#525252" text-anchor="middle">4 PM</text>

  <!-- Hour lines right -->
  <line x1="343" y1="136" x2="636" y2="136" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="343" y1="176" x2="636" y2="176" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="343" y1="216" x2="636" y2="216" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="343" y1="256" x2="636" y2="256" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Lunch tile -->
  <rect x="350" y="138" width="278" height="20" rx="5" fill="#171717" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="360" y="152" font-family="Inter, sans-serif" font-size="9" fill="#737373">Lunch break · 1:00 PM</text>

  <!-- PREVIEW Gym session tile — dashed green border, glowing -->
  <rect x="350" y="178" width="278" height="40" rx="7" fill="url(#previewGlow)" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#greenGlow)"/>
  <text x="362" y="195" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Gym session</text>
  <text x="362" y="209" font-family="Inter, sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">@ Home · Wed · 2:00 PM</text>
  <!-- PREVIEW badge on tile -->
  <rect x="546" y="182" width="58" height="14" rx="7" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="575" y="192" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="#4ade80" text-anchor="middle" letter-spacing="0.5">PREVIEW</text>

  <!-- Changed indicator: time changed highlight -->
  <rect x="350" y="226" width="278" height="16" rx="4" fill="rgba(74,222,128,0.04)"/>
  <text x="362" y="238" font-family="Inter, sans-serif" font-size="8" fill="#4ade80">↕ Time changed: Tue 10:00 AM → Wed 2:00 PM</text>

  <!-- Bottom bar -->
  <rect y="290" width="640" height="30" fill="#111111"/>
  <rect y="290" width="640" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="320" y="309" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">Review changes · nothing has been saved yet</text>
</svg>
